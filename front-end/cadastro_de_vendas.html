<!DOCTYPE html>
<html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=Edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./styles/style.css">
        <link rel="stylesheet" href="./styles/form.css">

        <title>Registrar Venda</title> 
    </head>
    
    <body>

        <header class="cabecalho"><!-- parte de cima da página, geralmente o navegador/menu/banner -->
            <h1 class="titulo">Flora</h1>
            <h2 class="subtitulo">Acessórios</h2>
            <div class="divider"></div>
        </header>
                    
        <nav class="menu_lateral"><!-- parte de cima da página, geralmente o navegador/menu/banner -->
            <nav class="menu"><!-- menu de navegação -->
                <a class="dashboard" href="./index.html"></a>
                <a class="vendas" href="./cadastro_de_vendas.html"></a>
                <a class="vendedores" href="./vendedores.html"></a>
                <a class="produtos" href="./produtos.html"></a>
            </nav>
        </nav>

        <main class="container">
            <h3 class="titulo_pagina">Registrar Nova Venda</h3>
            
            <form id="vendaForm" class="venda-form">
                <select id="nomeVendedor" required>
                    <option value="" disabled selected>Selecione o Vendedor</option>
                    </select>
            
                <select id="codigoProduto" required>
                    <option value="" disabled selected>Selecione o Código do Produto</option>
                     </select>
            
                <input type="text" id="nomeProdutoDisplay" placeholder="Categoria e Nome do Produto..." readonly style="background-color: #e9e9e9; cursor: not-allowed; font-weight: bold;">
                
                <select id="mesVenda" required>
                    <option value="" disabled selected>Selecione o Mês da Venda</option>
                    <option value="JAN">Janeiro</option>
                    <option value="FEV">Fevereiro</option>
                    <option value="MAR">Março</option>
                    <option value="ABR">Abril</option>
                    <option value="MAI">Maio</option>
                    <option value="JUN">Junho</option>
                    <option value="JUL">Julho</option>
                    <option value="AGO">Agosto</option>
                    <option value="SET">Setembro</option>
                    <option value="OUT">Outubro</option>
                    <option value="NOV">Novembro</option>
                    <option value="DEZ">Dezembro</option>
                </select>
                
                <button type="submit" class="button-form">Registrar Venda</button>
            </form>
        </main>

        <div class="divider_bottom" role="separator" aria-hidden="true"></div>

        <footer class="rodape">
            <p>Projeto Integrador - UNIVESP</p>
            <p>PJI310 - A2026S1N2 - Grupo 9</p>
        </footer>
    
    <script type="module" src="./scripts/form.js"></script>
</body>
</html>
