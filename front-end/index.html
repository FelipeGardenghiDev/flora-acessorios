        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- exibe a página nas escalas dos dispositivos abertos (desktop ou mobile) -->
        <link rel="stylesheet" href="./styles/style.css"><!-- utiliza a linguagem de estilização CSS para a página -->
        <link rel="stylesheet" href="./styles/grafico.css"><!-- utiliza a linguagem de estilização CSS para a página -->
        <link rel="stylesheet" href="./styles/vendas_recentes.css"><!-- utiliza a linguagem de estilização CSS para a página -->

        <title>Home</title><!-- título da página -->
    </head>
    
    <body><!-- body parte que será exibida na página -->

        <header class="cabecalho"><!-- parte de cima da página, geralmente o navegador/menu/banner -->

            <h2 class="subtitulo">Acessórios</h2>
            <div class="divider"></div>
        </header>
                    
        <nav class="menu_lateral"><!-- parte de cima da página, geralmente o navegador/menu/banner -->

                    </div>

        <div class="divider_bottom" role="separator" aria-hidden="true"></div>

        <footer class="rodape">
